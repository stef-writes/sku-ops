name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sku_ops_test
          POSTGRES_USER: sku_ops
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sku_ops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6               # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5           # v5.3.0
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v3            # v3.2.0
        with:
          enable-cache: true

      # uv sync and ruff run from the workspace root (pyproject.toml + uv.lock live here)
      - name: Install project and dev deps
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check backend/

      - name: Format check
        run: uv run ruff format --check backend/

      - name: Run tests
        env:
          ENV: test
          DATABASE_URL: "postgresql://sku_ops:testpass@localhost:5432/sku_ops_test"
          JWT_SECRET: ci-test-secret
          # Leave ANTHROPIC_API_KEY unset — conftest sets it to "" so
          # ANTHROPIC_AVAILABLE=False and no real API calls are made in tests.
        run: uv run pytest --tb=short -q --timeout=60

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6               # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6            # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --max-warnings=0 src/

      - name: Format check
        run: npx prettier --check src/

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --run
