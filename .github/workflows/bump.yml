name: Bump Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    if: contains(github.event.head_commit.message, 'bump(release)') == false
    runs-on: ubuntu-latest
    environment: bump_action
    name: Bump version and create changelog with commitizen

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dev deps
        run: uv sync --dev
        working-directory: backend

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          changelog_increment_filename: body.md
          extra_requirements: "cz-conventional-gitmoji"
          git_name: "sku-ops-bot"
          git_email: "bot@sku-ops.dev"

      - name: Generate Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sku-ops v${{ env.REVISION }}"
          body_path: "body.md"
          tag_name: v${{ env.REVISION }}
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
