repos:
  # ── Python (backend) ──────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
        files: ^(backend|devtools)/
      - id: ruff-format
        name: ruff format
        files: ^(backend|devtools)/

  # ── JavaScript/JSX (frontend) ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && node_modules/.bin/eslint --max-warnings=0 "${@#frontend/}"' --
        files: ^frontend/src/.*\.(js|jsx)$
        pass_filenames: true

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: bash -c 'cd frontend && node_modules/.bin/prettier --write "${@#frontend/}"' --
        files: ^frontend/src/.*\.(js|jsx|json|css)$
        pass_filenames: true

  # ── Commit message (commitizen) ───────────────────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.1
    hooks:
      - id: commitizen
        name: commitizen check
        stages: [commit-msg]
        additional_dependencies:
          - cz-conventional-gitmoji

  # ── General hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
